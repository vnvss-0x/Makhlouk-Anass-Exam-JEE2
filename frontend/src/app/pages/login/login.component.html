<div class="min-h-screen bg-gradient-to-br from-primary-900 via-primary-800 to-primary-600 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 backdrop-blur-sm rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">CréditBanque</h1>
      <p class="text-primary-200 mt-1 text-sm">Gestion des crédits bancaires</p>
    </div>

    <div class="card p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Connexion</h2>

      <div *ngIf="errorMessage"
        class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
        <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"/>
        </svg>
        <span class="text-red-700 text-sm">{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="client1, employe1 ou admin"
            class="input-field"
            [class.border-red-400]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"/>
          <p *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            class="mt-1 text-xs text-red-500">Le nom d'utilisateur est requis.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="input-field"
            [class.border-red-400]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"/>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="mt-1 text-xs text-red-500">Le mot de passe est requis (min. 4 caractères).</p>
        </div>

        <button id="login-btn" type="submit" class="btn-primary" [disabled]="isLoading">
          <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          {{ isLoading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <div class="mt-6 p-4 bg-gray-50 rounded-xl">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Comptes de test</p>
        <div class="space-y-1">
          <div class="flex justify-between text-xs">
            <span class="text-gray-600 font-mono">client1</span>
            <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium">CLIENT</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="text-gray-600 font-mono">employe1</span>
            <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">EMPLOYÉ</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="text-gray-600 font-mono">admin</span>
            <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium">ADMIN</span>
          </div>
          <p class="text-xs text-gray-400 mt-1">Mot de passe : <span class="font-mono">secret1234</span></p>
        </div>
      </div>
    </div>
  </div>
</div>
