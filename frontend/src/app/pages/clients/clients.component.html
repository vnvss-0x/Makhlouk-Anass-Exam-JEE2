<app-navbar />

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Clients</h1>
      <p class="text-gray-500 mt-1">{{ clients.length }} client(s) enregistré(s)</p>
    </div>
  </div>

  <div class="card overflow-hidden">
    <div *ngIf="isLoading" class="flex items-center justify-center py-16">
      <div class="animate-spin h-8 w-8 border-4 border-primary-600 border-t-transparent rounded-full"></div>
    </div>

    <table *ngIf="!isLoading" class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nom</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        <tr *ngFor="let client of clients" class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm font-mono text-gray-500">#{{ client.id }}</td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-primary-100 rounded-full flex items-center justify-center">
                <span class="text-primary-700 font-semibold text-sm">{{ client.nom.charAt(0) }}</span>
              </div>
              <span class="text-sm font-medium text-gray-900">{{ client.nom }}</span>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">{{ client.email }}</td>
          <td class="px-6 py-4">
            <button *ngIf="authService.isAdmin()" (click)="deleteClient(client.id!)"
              id="delete-client-{{ client.id }}"
              class="px-3 py-1.5 bg-red-50 text-red-600 text-xs font-semibold rounded-lg hover:bg-red-100 transition-colors">
              Supprimer
            </button>
          </td>
        </tr>
        <tr *ngIf="clients.length === 0">
          <td colspan="4" class="px-6 py-12 text-center text-gray-400 text-sm">Aucun client trouvé.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
